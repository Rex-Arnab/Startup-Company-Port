<p localize="help_camera_controls_panning_headline_intro"></p>

<div class="flex-row">
    <div class="flex1 padding">
        <h3 localize="help_camera_controls_panning_headline"></h3>

        <video width="100%" autoplay loop>
            <source src="help/assets/panning.mp4" type="video/mp4">
        </video>

        <div class="shadow-box margin-top">
            <table class="keyboard-table">
                <tr>
                    <td class="text-center">
                        <key>A</key>
                        <key>←</key>
                    </td>
                    <td localize="help_camera_controls_panning_pan_left"></td>
                </tr>
                <tr>
                    <td class="text-center">
                        <key>D</key>
                        <key>→</key>
                    </td>
                    <td localize="help_camera_controls_panning_pan_right"></td>
                </tr>
                <tr>
                    <td class="text-center">
                        <key>W</key>
                        <key>↑</key>
                    </td>
                    <td localize="help_camera_controls_panning_pan_up"></td>
                </tr>
                <tr>
                    <td class="text-center">
                        <key>S</key>
                        <key>↓</key>
                    </td>
                    <td localize="help_camera_controls_panning_pan_down"></td>
                </tr>
            </table>

        </div>

    </div>
    <div class="flex1 padding">
        <h3 localize="help_camera_controls_zooming_headline"></h3>

        <video width="100%" autoplay loop>
            <source src="help/assets/zoom.mp4" type="video/mp4">
        </video>

        <div class="shadow-box margin-top">
            <table class="keyboard-table">
                <tr>
                    <td class="text-center">
                        <key>+</key>
                    </td>
                    <td localize="help_camera_controls_zooming_in"></td>
                </tr>
                <tr>
                    <td class="text-center">
                        <key>-</key>
                    </td>
                    <td localize="help_camera_controls_zooming_out"></td>
                </tr>
            </table>
        </div>
    </div>
</div>
