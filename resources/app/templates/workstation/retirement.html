<div class="padding flex-row">
    <div class="flex1 flex-column border-right-2 margin-right" style="justify-content: center">
        <div class="progress-container">
            <canvas id="progress" style="width: 100%; height: 100%"></canvas>
        </div>
        <div class="text-center margin-top">
            <h3 localize="years_till_retirement" localize-data-years="{{retirementCtrl.retirementInfo.yearsLeft }}" style="line-height: 140%;"></h3>
            <button class="blue small" localize="retire_now" ng-click="retirementCtrl.retireNow()"></button>
        </div>
    </div>
    <div class="flex1 flex-column">
        <div class="flex2">
            <div class="item-list">
                <div class="item">
                    <h3 localize="transfer_to_retirement_fund"></h3>
                    <div class="content">
                        <table class="medium">
                            <tr>
                                <td class="text-bold" style="width: 40%;" localize="amount"></td>
                                <td><input type="number" min="1" ng-model="retirementCtrl.amount"></td>
                            </tr>
                            <tr ng-if="retirementCtrl.investorCut > 0">
                                <td class="text-bold" localize="investor_cut" localize-data-percentage="{{ retirementCtrl.investorCut }}"></td>
                                <td>{{ retirementCtrl.investorCut | currency:'$':0 }}</td>
                            </tr>
                            <tr>
                                <td class="text-bold" localize="taxes_x" localize-data-percentage="{{ retirementCtrl.taxPercentage }}"></td>
                                <td>{{ retirementCtrl.taxes | currency:'$':0 }}</td>
                            </tr>
                            <tr>
                                <td class="text-bold" localize="total"></td>
                                <td>{{ retirementCtrl.total | currency:'$':0 }}</td>
                            </tr>
                            <tr>
                                <td></td>
                                <td>
                                    <button localize="transfer" ng-click="retirementCtrl.payBonus()"></button>
                                </td>
                            </tr>
                        </table>
                    </div>
                </div>
            </div>
        </div>
        <div class="flex3">
            <div class="text-center fund-balance">
                <h3 class="text-uppercase dimmed" localize="retirement_fund_balance"></h3>
                <h4 class="text-bold">{{$root.settings.ceo.retirementFund.balance | currency:'$':0 }}</h4>
            </div>
        </div>
    </div>
</div>

<div class="padding border-top-2">
    <div class="retirement-progress">
        <div class="indicator" style="width:{{retirementCtrl.retirementFundProgress}}%"></div>
        <ul class="points">
            <li ng-repeat="level in retirementCtrl.levels"
                uib-popover-html="level.description"
                popover-trigger="mouseenter"
                popover-append-to-body="true"
                popover-title="{{ level.label }}"
                ng-class="{active: level.goal <= $root.settings.ceo.retirementFund.balance }">
                <div class="dot"></div>
                <div class="label">{{ level.label }}</div>
            </li>
        </ul>
    </div>
</div>
