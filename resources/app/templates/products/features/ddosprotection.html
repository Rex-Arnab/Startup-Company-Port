<div  class="margin padding" localize="ddos_protection_efficiency_description"></div>

<hr>

<h3 localize="efficiency_x" localize-data-percentage="{{featuresDdosProtectionCtrl.selectedFeature.instance.efficiency}}"></h3>

<ul class="multi-toggle">
    <li ng-repeat="i in [1,5,10]"
        ng-click="featuresDdosProtectionCtrl.changeAmount(i)"
        ng-class="{ active: featuresDdosProtectionCtrl.efficiencyAmount == i, disabled: featuresDdosProtectionCtrl.maxEfficiency < (featuresDdosProtectionCtrl.selectedFeature.efficiency + i) }"
        uib-tooltip="{{ featuresDdosProtectionCtrl.maxText }}"
        tooltip-append-to-body="true"
        tooltip-enable="featuresDdosProtectionCtrl.level.maxEfficiency <= featuresDdosProtectionCtrl.selectedFeature.instance.efficiency">
        +{{i}}%
    </li>
</ul>
<div>
    <component component="::stack.component"
               class="small"
               stack-amount="stack.amount"
               show-inventory-amount="true"
               ng-disabled="!stack.isAvailableInInventory"
               ng-repeat="stack in featuresDdosProtectionCtrl.stacks track by stack.component.name">
    </component>
</div>

<button class="blue margin-top"
        ng-disabled="!featuresDdosProtectionCtrl.upgradeReady"
        ng-click="featuresDdosProtectionCtrl.upgrade()"
        localize="upgrade"
></button>
