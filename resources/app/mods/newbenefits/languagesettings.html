<h1 ng-init="ctrl.tab = 'settings';"> 
    <i class="fa fa-cog"></i></i>
Language Settings - New Benefits
<i class="fa fa-times pull-right close-button" close-all-ui></i>
</h1>
<div id="padding newbenefits-mainview" style="overflow: auto;height: 550px;">

    <ul class="tab-list" style="width: 100%; display: inline-block;">
        <li ng-class="{ active: ctrl.tab == 'settings' }" ng-click="ctrl.tab = 'settings'; "localize="settings"></li>
    </ul>

    <div ng-if="ctrl.tab == 'settings'" class="tab-content" style="min-height:500px;">
        <div class="padding">
            <p class="alert alert-info text-center" localize="newbenefits_stringsnotavailable"></p>
            <ng-include src="languagesModule.getView()"></ng-include>
            <div class="padding">
                <p class="ng-binding ng-scope" localize="tutorial_settings  "></p>
            </div>
        </div>
